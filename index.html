<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Skins 3.0</title>

<style>

body{
margin:0;
background:#050607;
color:white;
font-family:Arial;
}

header{
text-align:center;
padding:20px;
}

header h1{
color:#ffd82b;
letter-spacing:2px;
}

.panel{
background:#111317;
border-radius:16px;
padding:20px;
margin:20px;
}

.button-row{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
background:#ffd82b;
border:none;
padding:10px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.boombox-shell{
position:relative;
max-width:900px;
margin:auto;
}

.boombox-image{
width:100%;
}

.boombox-screen{
position:absolute;
overflow:hidden;
border-radius:0;
}

.debug-outline{
outline:2px dashed red;
}

iframe{
width:100%;
height:100%;
border:0;
}

textarea{
width:100%;
min-height:200px;
background:#050608;
color:white;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<h1>Playlist Skins</h1>
<p>Turn any playlist into a retro music player skin</p>
</header>

<section class="panel">

<h2>1. Media Link</h2>

<select id="platformType">
<option value="spotify">Spotify</option>
<option value="youtube">YouTube</option>
<option value="soundcloud">SoundCloud</option>
<option value="custom">Custom</option>
</select>

<input id="mediaUrl" type="text" placeholder="Paste media link">

<div class="button-row">

<button id="applyBtn">Apply</button>

<button id="debugBtn">Toggle Outline</button>

<button id="boomBoxBtn">BoomBox Skin</button>

<button id="purpleRabbitBtn">Purple Rabbit Skin</button>

<button id="new101Btn">New101 Skin</button>

<button onclick="window.location.href='skin-editor.html'">
Skin Editor
</button>

</div>

</section>

<section class="panel">

<h2>2. Preview</h2>

<div class="boombox-shell">

<img id="boomboxImage"
class="boombox-image"
src="./BoomBox.png">

<div id="boomboxScreen" class="boombox-screen">

<iframe id="mediaFrame"
src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M">
</iframe>

</div>

</div>

</section>

<section class="panel">

<h2>3. Copy Widget</h2>

<button id="copyBtn">Copy Code</button>

<textarea id="outputCode"></textarea>

</section>

<script>

const mediaFrame = document.getElementById("mediaFrame")
const boomboxImage = document.getElementById("boomboxImage")
const boomboxScreen = document.getElementById("boomboxScreen")
const mediaUrl = document.getElementById("mediaUrl")

let debugOn=false

const skins={

boombox:{
image:"./BoomBox.png",
pixels:{left:108,right:1201,top:201,bottom:301}
},

purpleRabbit:{
image:"./PurpleRabbit(3).png",
pixels:{left:204,right:1204,top:208,bottom:401}
},

new101:{
image:"./skins/New101.png",
pixels:{left:320,right:1280,top:120,bottom:340}
}

}

let currentSkin="boombox"

function applyPixelBox(){

const skin=skins[currentSkin]

const naturalWidth=boomboxImage.naturalWidth
const naturalHeight=boomboxImage.naturalHeight

const left=(skin.pixels.left/naturalWidth)*100
const top=(skin.pixels.top/naturalHeight)*100
const width=((skin.pixels.right-skin.pixels.left)/naturalWidth)*100
const height=((skin.pixels.bottom-skin.pixels.top)/naturalHeight)*100

boomboxScreen.style.left=left+"%"
boomboxScreen.style.top=top+"%"
boomboxScreen.style.width=width+"%"
boomboxScreen.style.height=height+"%"

}

function applySkin(name){

currentSkin=name

boomboxImage.src=skins[name].image

}

function toSpotify(url){

url=url.replace(
"open.spotify.com/playlist/",
"open.spotify.com/embed/playlist/"
)

return url.split("?")[0]

}

function toYouTube(url){

if(url.includes("watch?v=")){

let id=url.split("watch?v=")[1].split("&")[0]

return "https://www.youtube.com/embed/"+id

}

return url

}

function applyMedia(){

let url=mediaUrl.value

let platform=document.getElementById("platformType").value

if(platform==="spotify") url=toSpotify(url)

if(platform==="youtube") url=toYouTube(url)

mediaFrame.src=url

}

document.getElementById("applyBtn").onclick=applyMedia

document.getElementById("boomBoxBtn").onclick=()=>applySkin("boombox")

document.getElementById("purpleRabbitBtn").onclick=()=>applySkin("purpleRabbit")

document.getElementById("new101Btn").onclick=()=>applySkin("new101")

document.getElementById("debugBtn").onclick=function(){

debugOn=!debugOn

boomboxScreen.classList.toggle("debug-outline")

}

document.getElementById("copyBtn").onclick=function(){

let code=document.documentElement.outerHTML

navigator.clipboard.writeText(code)

alert("Code copied")

}

boomboxImage.onload=applyPixelBox

</script>

</body>
</html>
