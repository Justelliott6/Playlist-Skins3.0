<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playlist Skins</title>

<style>
  body {
    margin: 0;
    background: #050607;
    color: #fff;
    font-family: system-ui, sans-serif;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
    font-size: 1.8rem;
  }

  .container {
    padding: 20px;
  }

  /* 🔥 BOOMBOX */
  .boombox {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 30px auto;
  }

  .boombox img {
    width: 100%;
    display: block;
    border-radius: 12px;
  }

  /* 🔥 TUNER */
  .tuner {
    position: absolute;
    left: 10%;
    width: 80%;
    top: 14%;
    height: 12%;
    overflow: hidden;
  }

  /* 🔥 MIDDLE */
  .middle-bar {
    position: absolute;
    left: 16%;
    width: 68%;
    top: 29%;
    height: 17%;
    overflow: hidden;
  }

  /* 🔥 MAIN PLAYER */
  .main-player {
    position: absolute;
    left: 22%;
    width: 56%;
    top: 53%;
    height: 29%;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* 🔥 FOLLOW SECTION */
  .follow-section {
    margin-top: 50px;
    padding: 25px 15px;
  }

  .follow-section h2 {
    margin-bottom: 15px;
    letter-spacing: 2px;
  }

  .follow-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }

  .follow-links a {
    padding: 12px 18px;
    border-radius: 999px;
    background: #ffd82b;
    color: #000;
    text-decoration: none;
    font-weight: bold;
    letter-spacing: 1px;
    font-size: 0.9rem;
    transition: 0.2s;
  }

  .follow-links a:hover {
    background: #ffe760;
    transform: scale(1.05);
  }

</style>
</head>

<body>

<h1>Playlist Skins</h1>

<div class="container">

  <!-- 🔥 BOOMBOX -->
  <div class="boombox">

    <img src="BoomBox.png" alt="Boombox Skin" />

    <!-- TOP -->
    <div class="tuner"></div>

    <!-- MIDDLE -->
    <div class="middle-bar"></div>

    <!-- MAIN PLAYER -->
    <div class="main-player">
      <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"></iframe>
    </div>

  </div>

</div>

<!-- 🔥 FOLLOW SECTION -->
<div class="follow-section">
  <h2>Follow Me</h2>

  <div class="follow-links">
    <a href="https://www.facebook.com/JustElliott6" target="_blank">Facebook</a>
    <a href="https://x.com/justelliott1970" target="_blank">Twitter / X</a>
    <a href="https://www.youtube.com/@purplerabbitproductions" target="_blank">YouTube</a>
    <a href="https://www.facebook.com/PurpleRabbit2023/" target="_blank">Company Page</a>
    <a href="https://unitedmasters.com/a/elliott-palmer" target="_blank">UnitedMasters</a>
    <a href="https://share.google/43b6wTPVKf2N9ZPio" target="_blank">Google Profile</a>
    <a href="https://www.linkedin.com/in/elliott-palmer-16734520a/" target="_blank">LinkedIn</a>
    <a href="https://github.com/Justelliott6/" target="_blank">GitHub</a>
  </div>
</div>

</body>
</html>
