<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Playlist Skins 3.0</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
padding:0;
background:#050607;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
}

header{
padding:30px 10px;
}

h1{
font-size:2rem;
letter-spacing:2px;
}

.boombox-container{
position:relative;
width:95%;
max-width:900px;
margin:auto;
}

.boombox-image{
width:100%;
display:block;
}

.boombox-screen{
position:absolute;

/* TUNER POSITION */
top:15%;
left:12%;
width:76%;
height:18%;

overflow:hidden;
border-radius:6px;
}

.boombox-screen iframe{
width:100%;
height:100%;
border:0;
}

.player-controls{
margin-top:20px;
}

button{
background:#222;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin:4px;
}

button:hover{
background:#444;
}

footer{
margin-top:40px;
font-size:12px;
opacity:.6;
}

</style>

</head>


<body>


<header>

<h1>Playlist Skins</h1>
<p>Custom Boombox Playlist Player</p>

</header>


<div class="boombox-container">

<img src="Boom Box.png" class="boombox-image">

<div class="boombox-screen">

<iframe
src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

</div>



<div class="player-controls">

<button onclick="spotify()">Spotify</button>
<button onclick="facebook()">Facebook</button>
<button onclick="radio()">Radio</button>

</div>


<footer>

Playlist Skins 3.0 • Purple Rabbit Productions

</footer>


<script>

function spotify(){

document.querySelector(".boombox-screen iframe").src =
"https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"

}

function facebook(){

document.querySelector(".boombox-screen iframe").src =
"https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/facebook/videos/10153231379946729/"

}

function radio(){

document.querySelector(".boombox-screen iframe").src =
"https://stream.zeno.fm/f3wvbbqmdg8uv"

}

</script>



<script>

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>



</body>
</html>
