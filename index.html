<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist Skins 3.0</title>

<style>
body {
  margin:0;
  background:#050607;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

h1 {
  color:#ffd82b;
  letter-spacing:2px;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:10px;
}

input {
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:999px;
  background:#ffd82b;
  font-weight:bold;
  cursor:pointer;
}

/* BOOMBOX */
.boombox {
  position:relative;
  max-width:900px;
  margin:20px auto;
}

.boombox img {
  width:100%;
}

/* 🔥 PERFECT TUNER (LOCKED) */
.tuner {
  position:absolute;
  left:11.8%;
  top:18.9%;
  width:75.8%;
  height:12.1%;
  overflow:hidden;
  border-radius:14px;
}

/* 🔥 YOUTUBE FIXED */
.youtube {
  position:absolute;
  left:16.2%;
  top:39.8%;
  width:67.2%;
  aspect-ratio:16/9;
  overflow:hidden;
}

/* 🔥 LOWER SLOT */
.lower {
  position:absolute;
  left:25.4%;
  top:62.4%;
  width:49.6%;
  height:19%;
}

/* IFRAME */
iframe {
  width:100%;
  height:100%;
  border:none;
}

/* SPEAKERS FIXED */
.speaker {
  position:absolute;
  width:22.8%;
  aspect-ratio:1/1;
  border-radius:50%;
}

.left {
  left:3.4%;
  top:58.6%;
}

.right {
  right:3.4%;
  top:58.6%;
}

/* BUTTONS */
.btn {
  position:absolute;
  width:5%;
  aspect-ratio:1/1;
  border-radius:50%;
  background:#222;
  color:#fff;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.b1 { left:1.2%; top:35.2%; }
.b2 { left:1.2%; top:42.4%; }
.b3 { left:6.2%; top:41%; }

.b4 { right:1.2%; top:35.2%; }
.b5 { right:1.2%; top:42.4%; }

</style>
</head>

<body>

<div class="container">

<h1>PLAYLIST SKINS</h1>

<input id="spotifyInput" placeholder="Paste Spotify Playlist URL">

<button onclick="loadSpotify()">Add to BoomBox</button>

<div class="boombox">

<img src="./BoomBox.png">

<!-- 🔥 SPOTIFY -->
<div class="tuner">
  <iframe id="spotifyFrame"
  src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M">
  </iframe>
</div>

<!-- 🔥 YOUTUBE -->
<div class="youtube">
  <iframe id="youtubeFrame"
  src="https://www.youtube.com/embed/NQ3hbbwOnAw">
  </iframe>
</div>

<!-- 🔥 LOWER -->
<div class="lower">
  <iframe src="https://www.youtube.com/embed/NQ3hbbwOnAw"></iframe>
</div>

<!-- SPEAKERS -->
<div class="speaker left"></div>
<div class="speaker right"></div>

<!-- BUTTONS -->
<div class="btn b1">ED</div>
<div class="btn b2">YT</div>
<div class="btn b3">SP</div>
<div class="btn b4">CP</div>
<div class="btn b5">AI</div>

</div>

</div>

<script>

function loadSpotify() {
  let url = document.getElementById("spotifyInput").value;

  if(url.includes("playlist")) {
    url = url.replace("open.spotify.com/", "open.spotify.com/embed/");
    document.getElementById("spotifyFrame").src = url;
  } else {
    alert("Use a Spotify playlist link");
  }
}

</script>

</body>
</html>
