<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Playlist Skins 3.0</title>

<style>

body{
margin:0;
padding:0;
background:#050607;
color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
}

header{
padding:30px 10px;
}

h1{
font-size:2rem;
letter-spacing:2px;
}

.boombox-container{
position:relative;
width:95%;
max-width:900px;
margin:auto;
}

.boombox-image{
width:100%;
display:block;
}

/* MAIN PLAYER (TOP BOX) */
.boombox-screen{
position:absolute;
top:14.5%;
left:10%;
width:80%;
height:12%;
overflow:hidden;
border-radius:6px;
background:#000;
}

.boombox-screen iframe{
width:100%;
height:100%;
border:0;
}

/* OVERLAY (glass effect) */
.boombox-screen::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(0,0,0,0.3));
}

.player-controls{
margin-top:20px;
}

button{
background:#222;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin:4px;
}

button:hover{
background:#444;
}

/* FOLLOW BUTTONS */
.follow{
margin-top:40px;
padding:20px;
}

.follow-icons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.follow-icons a{
display:inline-block;
}

.follow-icons img{
width:42px;
height:42px;
transition:0.2s;
}

.follow-icons img:hover{
transform:scale(1.1);
}

footer{
margin-top:40px;
font-size:12px;
opacity:.6;
}

</style>

</head>


<body>


<header>

<h1>Playlist Skins</h1>
<p>Custom Boombox Playlist Player</p>

</header>


<div class="boombox-container">

<img src="BoomBox.png" class="boombox-image">

<div class="boombox-screen">

<iframe
id="player"
src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

</div>


<div class="player-controls">

<button onclick="spotify()">Spotify</button>
<button onclick="youtube()">YouTube</button>
<button onclick="radio()">Radio</button>

</div>


<!-- FOLLOW SECTION -->
<div class="follow">

<h3 style="opacity:.7;letter-spacing:2px;">FOLLOW ME</h3>

<div class="follow-icons">

</a>

</a>

<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

<a href="https://www.facebook.com/PurpleRabbit2023/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

<a href="https://unitedmasters.com/a/elliott-palmer" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/25/25231.png">
</a>

<a href="https://share.google/43b6wTPVKf2N9ZPio" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
</a>

<a href="https://www.linkedin.com/in/elliott-palmer-16734520a/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">

</div>

</div>


<footer>

Playlist Skins 3.0 • Purple Rabbit Productions

</footer>


<script>

function spotify(){
document.getElementById("player").src =
"https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"

</body>
</html>
