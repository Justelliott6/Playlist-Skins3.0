<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist Skins 3.0</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Playlist Skins 3.0</h1>
    <p>Purple Rabbit Productions • Boombox Playlist App</p>
  </header>

  <main class="app-shell">
    <section class="controls-card">
      <label for="embedInput">Paste Spotify playlist, album, track, or embed link</label>
      <textarea id="embedInput" placeholder="Paste Spotify link here...">https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M</textarea>

      <div class="button-row">
        <button id="loadEmbedBtn">Load Player</button>
        <button type="button" onclick="setSkin('boombox')">BoomBox Skin</button>
        <button type="button" onclick="setSkin('purpleRabbit')">Purple Rabbit Skin</button>
      </div>
    </section>

    <section class="player-stage">
      <div class="boombox-wrap">
        <div class="boombox">
          <img id="boomboxSkin" src="BoomBox.png" alt="Boombox skin" />

          <div class="tuner-window" id="tunerWindow">
            <iframe
              id="mediaFrame"
              src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy">
            </iframe>
          </div>
        </div>
      </div>
    </section>

    <section class="code-card">
      <div class="code-label-row">
        <span>Embed Code</span>
        <button id="copyCodeBtn">Copy Code</button>
      </div>
      <textarea id="outputCode" readonly></textarea>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
